# Training config for Kaggle GPU sessions (see KAGGLE.md).
# Runs get the standard <date>_<time>_kaggle name; the notebook's resume
# cell finds the most recent run's checkpoint, so sessions still continue
# each other without a fixed path.
data_processed_root: /kaggle/working/data_processed
sample_rate: 44100
clip_seconds: 5.0
clips_per_epoch: 1000
val_clips: 200
val_fraction: 0.1
split_seed: 0
batch_size: 16
lr: 0.0003
num_epochs: 60
checkpoint_dir: /kaggle/working/checkpoints
log_dir: /kaggle/working/runs
device: auto
checkpoint_every: 5
num_workers: 4
